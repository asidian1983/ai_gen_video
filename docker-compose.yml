version: '3.8'

# ─────────────────────────────────────────────────────────────────────────────
# AI Video Generation Platform — Docker Compose
#
# Services:
#   api      — NestJS HTTP server  (port 3000)
#   worker   — BullMQ job processor (no HTTP port)
#   postgres — PostgreSQL 16
#   redis    — Redis 7 (queue + status cache)
#
# Both `api` and `worker` use the same Docker image built from Dockerfile.
# The `api` service triggers the build and tags it; `worker` reuses the tag.
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── API ────────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: ai-gen-video:latest          # worker will reuse this tag
    container_name: ai-gen-video-api
    command: ["node", "dist/main"]
    restart: unless-stopped
    ports:
      - '${PORT:-3000}:3000'
    environment:
      - NODE_ENV=production
      - DB_HOST=postgres
      - REDIS_HOST=redis
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/health || exit 1']
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    networks:
      - ai-gen-video-network

  # ── Worker ─────────────────────────────────────────────────────────────────
  worker:
    image: ai-gen-video:latest          # same image as api, different command
    container_name: ai-gen-video-worker
    command: ["node", "dist/main.worker"]
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DB_HOST=postgres
      - REDIS_HOST=redis
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      # No HTTP — check that the Node process (PID 1) is alive
      test: ['CMD-SHELL', 'kill -0 1 2>/dev/null || exit 1']
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    networks:
      - ai-gen-video-network

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ai-gen-video-db
    restart: unless-stopped
    ports:
      - '${DB_PORT:-5432}:5432'
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_DATABASE:-ai_gen_video}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME:-postgres}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-gen-video-network

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ai-gen-video-redis
    restart: unless-stopped
    ports:
      - '${REDIS_PORT:-6379}:6379'
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1
      --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-gen-video-network

volumes:
  postgres_data:
  redis_data:

networks:
  ai-gen-video-network:
    driver: bridge
